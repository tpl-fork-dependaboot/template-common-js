name: Init Repository and Resolve Dynamic Template
on:
  - create
  - workflow_dispatch # Sometimes the create event does not seem to be fired


jobs:
  init_fork:
    name: Init Dynamic Template Fork
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps: 
    
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}
    
      - name: Copy j2 file as normal file
        run: |
          find . -type f -name "*.j2" -print0 | while read -d $'\0' file;
          do
            newfile=${file%.j2}
            echo "Rename file ${file} to ${newfile}"
            cp "${file}" "${newfile}"
            if [[ -f ".fork/link.json" ]]; then
              cat .fork/link.json | jq '. + [{"type": "file", "remote": "${file}", "local": "${newfile}"}]' >> .fork/link.json.next
              mv .fork/link.json.next .fork/link.json
            else
              mkdir -p .fork
              echo '[{"type": "file", "remote": "${file}", "local": "${newfile}"}]' > .fork/link.json
            fi
          done

      - name: Copy Specific Directories
        shell: bash
        run: |
          find . -type d -name "\$*" -print0 | while read -d $'\0' dirpath;
          do
            lastdir=${dirpath##*/}
            path=${dirpath%/*}
            newdirpath="$path/${lastdir#$}"
            echo "Rename directory ${dirpath} to ${newdirpath}"
            cp -R "${dirpath}/." "${newdirpath}"
            if [[ -f ".fork/link.json" ]]; then
              cat .fork/link.json | jq '. + [{"type": "file", "remote": "${file}", "local": "${newfile}"}]' >> .fork/link.json.next
              mv .fork/link.json.next .fork/link.json
            else
              mkdir -p .fork
              echo '[{"type": "file", "remote": "${file}", "local": "${newfile}"}]' > .fork/link.json
            fi
          done

      - name: Commit & Push changes
        uses: actions-js/push@master
        with:
          github_token: ${{ secrets.PAT }}
          message: "Init Fork"
        